<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIWA {IA} — Agente de Consultas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0090FF;--purple:#A855F7;--text:rgba(255,255,255,0.88);--muted:rgba(255,255,255,0.42);--border:rgba(0,144,255,0.18);--radius:16px}
html,body{background:transparent!important;font-family:"DM Sans",sans-serif;overflow:hidden;width:100%;height:100%}
#app{width:100%;height:560px;background:transparent;display:flex;align-items:flex-end;justify-content:flex-end;padding:12px 20px;position:relative}
#chat-panel{position:absolute;bottom:70px;right:20px;width:340px;background:rgba(8,6,24,0.97);border:0.5px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;z-index:15;transition:transform 0.28s cubic-bezier(0.34,1.45,0.64,1),opacity 0.22s}
#chat-panel.minimized{transform:scale(0.92) translateY(12px);opacity:0;pointer-events:none}
.chat-header{padding:13px 15px;background:rgba(0,144,255,0.06);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-avatar{width:36px;height:36px;border-radius:50%;background:rgba(6,7,22,0.8);border:1px solid rgba(0,144,255,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.header-avatar img{width:28px;height:28px;object-fit:contain}
.header-info{flex:1}
.header-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:#fff;line-height:1}
.header-name span{color:var(--purple)}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.online-indicator{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(34,197,94,0.8);flex-shrink:0}
.online-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px rgba(34,197,94,0.6);animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
#messages{flex:1;overflow-y:scroll;overflow-x:hidden;padding:14px 13px 8px;display:flex;flex-direction:column;gap:11px;height:300px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
#messages::-webkit-scrollbar-thumb{background:rgba(0,144,255,0.3);border-radius:4px}
.msg{display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;background:rgba(6,7,22,0.8);border:0.5px solid rgba(0,144,255,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.msg-avatar img{width:20px;height:20px;object-fit:contain}
.msg.user .msg-avatar{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12)}
.msg-bubble{max-width:78%;padding:8px 12px;border-radius:13px;font-size:12.5px;line-height:1.55;color:var(--text);word-break:break-word}
.msg.bot .msg-bubble{background:rgba(0,144,255,0.1);border:0.5px solid rgba(0,144,255,0.2);border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(0,144,255,0.22),rgba(168,85,247,0.22));border:0.5px solid rgba(168,85,247,0.28);border-bottom-right-radius:4px;text-align:right}
.error-bubble .msg-bubble{background:rgba(220,38,38,0.12);border-color:rgba(220,38,38,0.25);color:rgba(255,180,180,0.9)}
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:rgba(0,144,255,0.7);animation:dot-bounce 1.3s infinite}
.typing-dots span:nth-child(2){animation-delay:0.18s}.typing-dots span:nth-child(3){animation-delay:0.36s}
@keyframes dot-bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.cursor::after{content:"▋";font-size:10px;color:var(--blue);animation:cur-blink 0.7s infinite;margin-left:1px}
@keyframes cur-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.input-area{padding:9px 11px 11px;border-top:0.5px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0}
#user-input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid rgba(0,144,255,0.2);border-radius:20px;padding:8px 14px;font-size:12.5px;color:var(--text);outline:none;resize:none;font-family:"DM Sans",sans-serif;line-height:1.45;height:38px;overflow:hidden;transition:border-color 0.18s}
#user-input::placeholder{color:var(--muted)}
#user-input:focus{border-color:rgba(0,144,255,0.5)}
#send-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.45;transition:transform 0.15s,opacity 0.15s}
#send-btn.active{opacity:1}
#send-btn svg{width:14px;height:14px}
.powered-by{text-align:center;font-size:9.5px;color:rgba(255,255,255,0.15);padding:5px;border-top:0.5px solid rgba(255,255,255,0.04);flex-shrink:0;font-family:"Syne",sans-serif;letter-spacing:0.04em}
.powered-by span{color:rgba(0,144,255,0.4)}
#toggle-btn{position:absolute;bottom:14px;right:20px;z-index:20;height:46px;padding:0 20px;border-radius:23px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);display:flex;align-items:center;gap:9px;font-family:"Montserrat",sans-serif;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:0.02em;animation:pulse-pill 2.5s ease-in-out infinite}
@keyframes pulse-pill{0%,100%{box-shadow:0 4px 18px rgba(0,144,255,0.45)}50%{box-shadow:0 4px 28px rgba(168,85,247,0.65)}}
#toggle-btn:hover{filter:brightness(1.12)}
#toggle-btn svg{width:18px;height:18px;flex-shrink:0}
@media(max-width:380px){#chat-panel{width:calc(100vw - 28px);right:14px}}
</style>
</head>

<script>
var WEBHOOK_URL = 'https://giwa-ia.app.n8n.cloud/webhook/giwa-chat';
var ELEPHANT_SRC =  + elephant + ;
var sessionId = 'sess_' + Math.random().toString(36).slice(2, 10);
var isOpen = true;
var isWaiting = false;

var panel     = document.getElementById('chat-panel');
var toggleBtn = document.getElementById('toggle-btn');
var msgBox    = document.getElementById('messages');
var input     = document.getElementById('user-input');
var sendBtn   = document.getElementById('send-btn');

addBotMessage('Hola! Soy el agente de consultas de GIWA. En que puedo ayudarte hoy?');

toggleBtn.onclick = function() {
  isOpen = !isOpen;
  if (isOpen) {
    panel.classList.remove('minimized');
  } else {
    panel.classList.add('minimized');
  }
};

input.oninput = function() {
  if (input.value.trim().length > 0) {
    sendBtn.classList.add('active');
  } else {
    sendBtn.classList.remove('active');
  }
};

input.onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
};

sendBtn.onclick = function() {
  handleSend();
};

function handleSend() {
  var text = input.value.trim();
  if (!text || isWaiting) return;
  addUserMessage(text);
  input.value = '';
  sendBtn.classList.remove('active');
  isWaiting = true;
  var typingEl = addTyping();
  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text, sessionId: sessionId })
  })
  .then(function(res) {
    typingEl.remove();
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    var reply = data.reply || data.output || data.text || data.message
                || (Array.isArray(data) && (data[0].reply || data[0].output || data[0].text))
                || 'Recibi tu consulta, te respondo enseguida.';
    typewriterMessage(reply);
    isWaiting = false;
  })
  .catch(function(err) {
    typingEl.remove();
    addBotMessage('Hubo un error al conectar con el agente.', true);
    isWaiting = false;
  });
}

function avatarBot() {
  return '<div class="msg-avatar"><img src="' + ELEPHANT_SRC + '" style="width:20px;height:20px;object-fit:contain" /></div>';
}
function avatarUser() {
  return '<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)" width="13" height="13"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
}
function addUserMessage(text) {
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = avatarUser() + '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
  msgBox.appendChild(div);
  scrollBottom();
}
function addBotMessage(text, isError) {
  var div = document.createElement('div');
  div.className = 'msg bot' + (isError ? ' error-bubble' : '');
  div.innerHTML = avatarBot() + '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
  msgBox.appendChild(div);
  scrollBottom();
  return div;
}
function addTyping() {
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = avatarBot() + '<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgBox.appendChild(div);
  scrollBottom();
  return div;
}
function typewriterMessage(text) {
  var div = document.createElement('div');
  div.className = 'msg bot';
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble cursor';
  div.innerHTML = avatarBot();
  div.appendChild(bubble);
  msgBox.appendChild(div);
  scrollBottom();
  var i = 0;
  var speed = Math.max(14, Math.min(32, 2400 / text.length));
  var timer = setInterval(function() {
    bubble.textContent = text.slice(0, ++i);
    scrollBottom();
    if (i >= text.length) { clearInterval(timer); bubble.classList.remove('cursor'); }
  }, speed);
}
function scrollBottom() { msgBox.scrollTop = msgBox.scrollHeight; }
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/
/g,'<br>');
}
</script>
