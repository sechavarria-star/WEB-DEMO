<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIWA {IA} — Agente de Consultas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & BASE ───────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:    #0090FF;
    --purple:  #A855F7;
    --navy:    #060716;
    --navy2:   #0a0a2e;
    --glass:   rgba(255,255,255,0.04);
    --border:  rgba(0,144,255,0.18);
    --border2: rgba(168,85,247,0.18);
    --text:    rgba(255,255,255,0.88);
    --muted:   rgba(255,255,255,0.42);
    --radius:  16px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── FULL-PAGE CONTAINER ────────────────────────── */
  #app {
    width: 100vw;
    height: 100vh;
    background: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(0,144,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 70% 70%, rgba(168,85,247,0.07) 0%, transparent 55%),
                linear-gradient(160deg, #060716 0%, #0a0922 50%, #08041a 100%);
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 24px;
    position: relative;
  }

  /* subtle grid */
  #app::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,144,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,144,255,0.035) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }

  /* ── FLOATING BUTTON ────────────────────────────── */
  #toggle-btn {
    position: relative;
    z-index: 20;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
    box-shadow: 0 4px 20px rgba(0,144,255,0.35), 0 0 0 0 rgba(168,85,247,0.25);
    flex-shrink: 0;
  }
  #toggle-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 28px rgba(0,144,255,0.45), 0 0 0 10px rgba(168,85,247,0.1);
  }
  #toggle-btn svg { width: 24px; height: 24px; transition: opacity 0.15s; }

  /* pulse ring */
  .pulse-ring {
    position: absolute;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,144,255,0.45);
    animation: pulse-out 2.5s ease-out infinite;
    pointer-events: none;
    z-index: 19;
    bottom: 24px;
    right: 24px;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
  @keyframes pulse-out {
    0%   { transform: scale(1);   opacity: 0.7; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  .pulse-ring.hidden { display: none; }

  /* ── CHAT PANEL ─────────────────────────────────── */
  #chat-panel {
    position: absolute;
    bottom: 96px;
    right: 24px;
    width: 360px;
    max-height: calc(100vh - 120px);
    background: rgba(8, 6, 24, 0.97);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 15;
    transform: scale(0.9) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.34,1.45,0.64,1), opacity 0.2s;
  }
  #chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* header */
  .chat-header {
    padding: 14px 16px;
    background: rgba(0,144,255,0.06);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .header-name span { color: var(--purple); }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }
  .online-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 10.5px;
    color: rgba(34,197,94,0.8);
    flex-shrink: 0;
  }
  .online-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.6);
    animation: blink 2.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 280px;
    max-height: 380px;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,144,255,0.25); border-radius: 2px; }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 9px; font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: -0.3px;
  }
  .msg.user .msg-avatar {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.12);
    font-size: 10px;
  }

  .msg-bubble {
    max-width: 78%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
  }
  .msg.bot .msg-bubble {
    background: rgba(0,144,255,0.1);
    border: 0.5px solid rgba(0,144,255,0.2);
    border-bottom-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(0,144,255,0.22), rgba(168,85,247,0.22));
    border: 0.5px solid rgba(168,85,247,0.28);
    border-bottom-right-radius: 4px;
    text-align: right;
  }

  /* typing */
  .typing-dots {
    display: flex; gap: 4px; align-items: center; padding: 2px 0;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(0,144,255,0.7);
    animation: dot-bounce 1.3s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dot-bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* cursor blink for typewriter */
  .cursor::after {
    content: '▋';
    font-size: 11px;
    color: var(--blue);
    animation: cursor-blink 0.7s infinite;
    margin-left: 1px;
  }
  @keyframes cursor-blink {
    0%,49% { opacity: 1; } 50%,100% { opacity: 0; }
  }

  /* suggestions */
  .suggestions {
    padding: 4px 14px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
  }
  .suggestion-chip {
    background: rgba(0,144,255,0.08);
    border: 0.5px solid rgba(0,144,255,0.22);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 11.5px;
    color: rgba(0,144,255,0.9);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .suggestion-chip:hover {
    background: rgba(0,144,255,0.16);
    border-color: rgba(0,144,255,0.4);
  }

  /* input area */
  .input-area {
    padding: 10px 12px 12px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(0,144,255,0.2);
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    resize: none;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.45;
    max-height: 80px;
    overflow-y: auto;
    transition: border-color 0.18s;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input:focus { border-color: rgba(0,144,255,0.5); }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0.5;
  }
  #send-btn.active { opacity: 1; }
  #send-btn:hover.active { transform: scale(1.1); }
  #send-btn svg { width: 15px; height: 15px; }

  /* powered by */
  .powered-by {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    padding: 6px;
    border-top: 0.5px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.04em;
  }
  .powered-by span { color: rgba(0,144,255,0.45); }

  /* error toast */
  .error-bubble .msg-bubble {
    background: rgba(220,38,38,0.12);
    border-color: rgba(220,38,38,0.25);
    color: rgba(255,180,180,0.9);
  }

  /* ── RESPONSIVE (dentro de iframe pequeño) ───────── */
  @media (max-width: 400px) {
    #chat-panel { width: calc(100vw - 16px); right: 8px; }
    #app { padding: 8px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Pulse rings (hidden when chat is open) -->
  <div class="pulse-ring" id="pulse1"></div>
  <div class="pulse-ring" id="pulse2"></div>

  <!-- Chat panel -->
  <div id="chat-panel">
    <div class="chat-header">
      <div class="header-avatar">G</div>
      <div class="header-info">
        <div class="header-name">GIWA <span>{IA}</span></div>
        <div class="header-sub">Agente de consultas</div>
      </div>
      <div class="online-indicator">
        <div class="online-dot"></div>
        en línea
      </div>
    </div>

    <div id="messages"></div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="sendSuggestion('¿Qué servicios ofrecen?')">¿Qué servicios ofrecen?</button>
      <button class="suggestion-chip" onclick="sendSuggestion('¿Cómo arrancamos un proyecto?')">¿Cómo arrancamos?</button>
      <button class="suggestion-chip" onclick="sendSuggestion('Quiero una demo')">Quiero una demo</button>
    </div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Escribí tu consulta..." rows="1"></textarea>
      <button id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2" fill="white" stroke="none"></polygon>
        </svg>
      </button>
    </div>

    <div class="powered-by">powered by <span>GIWA {IA}</span></div>
  </div>

  <!-- Floating toggle button -->
  <button id="toggle-btn" title="Consultar a GIWA">
    <svg id="icon-chat" viewBox="0 0 24 24" fill="white">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <svg id="icon-close" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="display:none">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────
const WEBHOOK_URL = 'https://giwa-ia.app.n8n.cloud/webhook/giwa-chat';
// El agente debe devolver: { "reply": "texto de respuesta" }

// ── STATE ─────────────────────────────────────────────
const sessionId = 'sess_' + Math.random().toString(36).slice(2, 10);
let isOpen = false;
let isWaiting = false;

// ── ELEMENTS ──────────────────────────────────────────
const panel     = document.getElementById('chat-panel');
const toggleBtn = document.getElementById('toggle-btn');
const iconChat  = document.getElementById('icon-chat');
const iconClose = document.getElementById('icon-close');
const msgBox    = document.getElementById('messages');
const input     = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const sugg      = document.getElementById('suggestions');
const pulse1    = document.getElementById('pulse1');
const pulse2    = document.getElementById('pulse2');

// ── TOGGLE ────────────────────────────────────────────
toggleBtn.addEventListener('click', () => {
  isOpen = !isOpen;
  panel.classList.toggle('open', isOpen);
  iconChat.style.display  = isOpen ? 'none'  : 'block';
  iconClose.style.display = isOpen ? 'block' : 'none';
  pulse1.classList.toggle('hidden', isOpen);
  pulse2.classList.toggle('hidden', isOpen);
  if (isOpen && msgBox.children.length === 0) {
    addBotMessage('¡Hola! Soy el agente de consultas de GIWA {IA}. ¿En qué puedo ayudarte hoy?');
  }
});

// ── INPUT HANDLING ────────────────────────────────────
input.addEventListener('input', () => {
  sendBtn.classList.toggle('active', input.value.trim().length > 0);
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 80) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

sendBtn.addEventListener('click', handleSend);

function sendSuggestion(text) {
  input.value = text;
  sendBtn.classList.add('active');
  handleSend();
}

// ── SEND ──────────────────────────────────────────────
async function handleSend() {
  const text = input.value.trim();
  if (!text || isWaiting) return;

  // hide suggestions after first message
  sugg.style.display = 'none';

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.classList.remove('active');

  isWaiting = true;
  const typingEl = addTyping();

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId })
    });

    typingEl.remove();

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    const reply = data.reply || data.output || data.text || data.message
                  || (Array.isArray(data) && (data[0].reply || data[0].output || data[0].text))
                  || 'Recibí tu consulta, te respondo enseguida.';

    typewriterMessage(reply);

  } catch (err) {
    typingEl.remove();
    addBotMessage('Hubo un error al conectar con el agente. Revisá que el webhook esté activo.', true);
    console.error('[GIWA Chat]', err);
  }

  isWaiting = false;
}

// ── MESSAGE BUILDERS ──────────────────────────────────
function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">
      <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)" width="14" height="14">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  msgBox.appendChild(div);
  scrollBottom();
}

function addBotMessage(text, isError = false) {
  const div = document.createElement('div');
  div.className = 'msg bot' + (isError ? ' error-bubble' : '');
  div.innerHTML = `
    <div class="msg-avatar">G</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  msgBox.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="msg-avatar">G</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  msgBox.appendChild(div);
  scrollBottom();
  return div;
}

function typewriterMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble cursor';
  div.innerHTML = `<div class="msg-avatar">G</div>`;
  div.appendChild(bubble);
  msgBox.appendChild(div);
  scrollBottom();

  let i = 0;
  const speed = Math.max(14, Math.min(32, 2400 / text.length)); // adapt speed to length
  const timer = setInterval(() => {
    bubble.textContent = text.slice(0, ++i);
    scrollBottom();
    if (i >= text.length) {
      clearInterval(timer);
      bubble.classList.remove('cursor');
    }
  }, speed);
}

// ── UTILS ─────────────────────────────────────────────
function scrollBottom() {
  msgBox.scrollTop = msgBox.scrollHeight;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
